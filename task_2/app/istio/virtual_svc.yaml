apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: app-virtual
spec:
  hosts:
  - "*"
  gateways:
  - app-gateway
  http:
  - match:
    - uri:
        exact: /log
      method:
        exact: POST

    timeout: 1s

    retries:
      attempts: 2
      perTryTimeout: 1s

    fault:
      delay:
        percentage:
          value: 80
        fixedDelay: 2s

    route:
    - destination:
        port:
          number: 80
        host: app-service

  - match:
    - uri:
        exact: /logs
    - uri:
        exact: /
    - uri:
        exact: /status

    route:
    - destination:
        port:
          number: 80
        host: app-service

  - match:
    - uri:
        prefix: /

    fault:
      abort:
        httpStatus: 404
        percentage:
          value: 100
    route:
    - destination:
        host: app-service
        port:
          number: 80